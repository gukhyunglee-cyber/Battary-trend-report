name: Weekly Battery Trend Report

on:
  schedule:
    # 매주 일요일 22:00 UTC (한국시간 월요일 07:00 KST)
    - cron: '0 22 * * 0'
  workflow_dispatch: # 웹에서 수동으로 버튼을 눌러 실행 가능하게 함

jobs:
  run-report:
    runs-on: ubuntu-22.04
    
    steps:
    - name: 📦 저장소 소스코드 가져오기
      uses: actions/checkout@v3

    - name: 🐍 파이썬 환경 설정 (3.11)
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: ⚙️ 의존성 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        sudo apt-get update
        sudo apt-get install -y xvfb

    - name: 🌐 브라우저 환경 (Playwright) 세팅
      run: |
        npx playwright install chromium
        sudo npx playwright install-deps chromium

    - name: 🔐 구글 로그인 세션 데이터(state.json) 복원
      env:
        AUTH_DATA: ${{ secrets.AUTH_DATA }}
      run: |
        # Base64로 저장된 시크릿을 state.json 파일로 복원
        if [ -n "$AUTH_DATA" ]; then
          mkdir -p user_data/browser_state/
          echo "$AUTH_DATA" | base64 --decode > user_data/browser_state/state.json
          echo "세션(state.json) 복원 완료"
        else
          echo "⚠️ AUTH_DATA Secret이 설정되지 않았습니다! (NotebookLM 접근 실패 가능성)"
          exit 1
        fi

    - name: 🚀 리포트 취합 및 메일 자동 발송 실행
      run: |
        xvfb-run -a python orchestrator.py
